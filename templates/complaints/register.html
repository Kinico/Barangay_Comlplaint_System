<!DOCTYPE html>
<html>
<head>
    <title>Register - Barangay Complaint System</title>
    <style>
        body {
            margin:0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#4e73df,#1cc88a);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }
        .register-container {
            background:white;
            padding:40px;
            border-radius:10px;
            width:350px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }
        h2 { text-align:center; margin-bottom:25px; }
        input {
            width:100%;
            padding:10px;
            margin:8px 0 15px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }
        button {
            width:100%;
            padding:10px;
            background:#4e73df;
            border:none;
            color:white;
            font-size:16px;
            border-radius:5px;
            cursor:pointer;
        }
        button:hover { background:#2e59d9; }
        .error {
            background:#f8d7da;
            color:#721c24;
            padding:10px;
            border-radius:5px;
            margin-bottom:15px;
        }
        .footer { text-align:center; margin-top:15px; color:#777; }
        a { color:#4e73df; text-decoration:none; }
        a:hover { text-decoration:underline; }
        .name-row {
            display: flex;
            gap: 10px;
        }
        .name-row div {
            flex: 1;
        }
    </style>
</head>
<body>

<div class="register-container">
    <h2>Create Account</h2>
    
    {% if messages %}
        {% for message in messages %}
            <div class="error">{{ message }}</div>
        {% endfor %}
    {% endif %}
    
    <form method="POST">
        {% csrf_token %}
        
        <div class="name-row">
            <div>
                <label>First Name</label>
                <input type="text" name="first_name" required>
            </div>
            <div>
                <label>Last Name</label>
                <input type="text" name="last_name" required>
            </div>
        </div>
        
        <label>Email Address (this will be your login)</label>
        <input type="email" name="email" placeholder="your@email.com" required>
        
        <label>Password</label>
        <input type="password" name="password" required>
        
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" required>
        
        <button type="submit">Register with Email</button>
    </form>
    
    <div class="footer">
        Already have an account? <a href="{% url 'home' %}">Login here</a>
    </div>
</div>

</body>
</html>
